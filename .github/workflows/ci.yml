name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile --unsafe-perm
      
      - name: Rodar testes
        run: pnpm test