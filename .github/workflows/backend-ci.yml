name: Backend CI - Testes Automatizados

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Testes com Mock do Banco de Dados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verificar formatação
        working-directory: backend
        run: deno fmt --check supabase/functions/

      - name: Verificar lint
        working-directory: backend
        run: deno lint supabase/functions/

      - name: Executar testes com mocks do banco de dados
        working-directory: backend
        run: deno test --allow-env supabase/functions/
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: test-anon-key-ci
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key-ci
